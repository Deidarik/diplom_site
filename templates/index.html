<!DOCTYPE html>
<html>
<head>
    <title>Automotive Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.card-img-top { height: 180px; object-fit: contain; padding: 10px; }</style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-5">Каталог автотоваров</h1>
        <div class="row">
            {% for item in items %}
            <div class="col-md-3 mb-4">
                <div class="card h-100 shadow-sm border-0 text-center">
                    <img src="{{ item.img }}" class="card-img-top" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                    <div class="card-body">
                        <small class="text-muted">{{ item.brand }}</small>
                        <h6 class="card-title">{{ item.title }}...</h6>
                        <a href="/item/{{ item.idx }}" class="btn btn-sm btn-outline-primary mt-2">Посмотреть</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
