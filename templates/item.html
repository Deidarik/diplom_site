<!DOCTYPE html>
<html>
<head>
    <title>{{ target.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.sim-img { height: 120px; object-fit: contain; }</style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <a href="/" class="btn btn-sm btn-secondary mb-4">← В каталог</a>
        
        <div class="row bg-white p-4 shadow-sm rounded">
    <div class="col-md-4 text-center">
        <!-- Показываем реальное фото -->
        <img src="{{ target.img }}" class="img-fluid rounded" onerror="this.src='https://via.placeholder.com/300?text=No+Photo'">
    </div>
    <div class="col-md-8">
        <h2 class="fw-bold">{{ target.title }}</h2>
        <p class="text-muted">Бренд: <span class="badge bg-dark">{{ target.brand }}</span> | ASIN: <code>{{ asin }}</code></p>
        <h3 class="text-success">Цена: {{ target.price }}</h3>
        <hr>
        <div class="d-grid gap-2 d-md-block">
            <button class="btn btn-primary btn-lg">Добавить в корзину</button>
            <a href="https://www.amazon.com/dp/{{ asin }}" target="_blank" class="btn btn-outline-warning btn-lg">На Amazon</a>
        </div>
    </div>
</div>

        <h3 class="mt-5 mb-4">С этим товаром также покупают (LightGCN):</h3>
        <div class="row">
            {% for s in similar %}
            <div class="col-md-3 mb-4">
                <div class="card h-100 border-0 shadow-sm text-center p-2">
                    <img src="{{ s.img }}" class="sim-img card-img-top" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="card-body">
                        <p class="small mb-1">{{ s.title }}</p>
                        <a href="/item/{{ s.idx }}" class="btn btn-xs btn-link p-0">Подробнее</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
