<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title | default("Магазин Игр") }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar (Шапка сайта из ТЗ п.1) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">GNN Store</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        {% if user %}
            <li class="nav-item"><a class="nav-link" href="/">Каталог</a></li>
            <li class="nav-item"><a class="nav-link" href="/liked">Понравившееся</a></li>
            <li class="nav-item"><a class="nav-link" href="/cart">Корзина</a></li>
            <li class="nav-item"><a class="nav-link" href="/profile">Профиль ({{ user.login }})</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="/logout">Выйти</a></li>
        {% else %}
            <li class="nav-item"><a class="nav-link" href="/login">Войти</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- Скрипт для кнопок "Лайк", "В корзину", "Удалить" -->
<script>
async function toggleStatus(btn, gamerId, action, layout) {
    let formData = new FormData();
    formData.append('gamerId', gamerId);
    formData.append('actionType', action);

    let res = await fetch('/status', { method: 'POST', body: formData });
    let data = await res.json();

    if (data.status === 'success') {
        if (action === 'like') {
            btn.setAttribute('onclick', `toggleStatus(this, '${gamerId}', 'remove_like', '${layout}')`);
            if (layout === 'catalog') { btn.className = "btn btn-sm btn-danger w-50"; btn.innerHTML = "❌ Убрать"; }
            if (layout === 'main') { btn.className = "btn btn-danger btn-lg"; btn.innerHTML = "❤ В избранном (Убрать)"; }
            if (layout === 'mini') { btn.className = "btn btn-sm btn-danger w-100"; btn.innerHTML = "❌ Убрать"; } // ИСПРАВЛЕНО
        } else if (action === 'remove_like') {
            btn.setAttribute('onclick', `toggleStatus(this, '${gamerId}', 'like', '${layout}')`);
            if (layout === 'catalog') { btn.className = "btn btn-sm btn-outline-danger w-50"; btn.innerHTML = "❤ Лайк"; }
            if (layout === 'main') { btn.className = "btn btn-outline-danger btn-lg"; btn.innerHTML = "❤ Понравилось"; }
            if (layout === 'mini') { btn.className = "btn btn-sm btn-outline-danger w-100"; btn.innerHTML = "❤ Лайк"; } // ИСПРАВЛЕНО
        } else if (action === 'cart') {
            btn.setAttribute('onclick', `toggleStatus(this, '${gamerId}', 'remove_cart', '${layout}')`);
            if (layout === 'catalog') { btn.className = "btn btn-sm btn-success w-50"; btn.innerHTML = "❌ Из корзины"; }
            if (layout === 'main') { btn.className = "btn btn-success btn-lg"; btn.innerHTML = "В корзине (Убрать)"; }
            if (layout === 'mini') { btn.className = "btn btn-sm btn-success w-100"; btn.innerHTML = "❌ Из корзины"; } // ИСПРАВЛЕНО
        } else if (action === 'remove_cart') {
            btn.setAttribute('onclick', `toggleStatus(this, '${gamerId}', 'cart', '${layout}')`);
            if (layout === 'catalog') { btn.className = "btn btn-sm btn-outline-success w-50"; btn.innerHTML = "🛒 Купить"; }
            if (layout === 'main') { btn.className = "btn btn-primary btn-lg"; btn.innerHTML = "Добавить в корзину"; }
            if (layout === 'mini') { btn.className = "btn btn-sm btn-outline-success w-100"; btn.innerHTML = "🛒 В корзину"; } // ИСПРАВЛЕНО
        }
    } else {
        alert("Ошибка авторизации");
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
